name: web_scrape
description: Scrape web pages using Firecrawl API
input_schema:
  properties:
    url:
      type: string
      description: URL to scrape
    format:
      type: string
      enum: [markdown, html, text]
      description: Output format (default: markdown)
  required: [url]
implementation:
  script: scripts/web_scrape.sh
  runtime: sh
