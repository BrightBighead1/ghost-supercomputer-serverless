name: query_qdrant_cloud
description: Search Qdrant Cloud vector database (persistent)
input_schema:
  properties:
    collection:
      type: string
      description: Collection name to search
    vector:
      type: array
      description: Query vector for similarity search
    limit:
      type: number
      description: Max results (default: 10)
  required: [collection, vector]
implementation:
  script: scripts/query_qdrant_cloud.sh
  runtime: sh
